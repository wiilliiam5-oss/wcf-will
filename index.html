<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCF Suporte Técnico</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark:  #0d1b14;
    --dark2: #111f18;
    --dark3: #172b1f;
    --teal:  #2ecfaa;
    --white: #ffffff;
    --text:  #d8ede7;
    --muted: #6ea898;
    --border:#1e3428;
  }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--dark); height:100vh; display:flex; align-items:center; justify-content:center; }
  .container { width:100%; max-width:800px; height:100vh; max-height:880px; background:var(--dark2); display:flex; flex-direction:column; border-radius:14px; box-shadow:0 16px 56px rgba(0,0,0,.6),0 0 0 1px var(--border); overflow:hidden; }
  .header { background:var(--dark); border-bottom:1px solid var(--border); padding:13px 18px; display:flex; align-items:center; gap:13px; flex-shrink:0; }
  .divider { width:1px; height:32px; background:var(--border); margin:0 4px; flex-shrink:0; }
  .header-info h1 { font-size:14.5px; font-weight:700; color:var(--white); }
  .header-info p  { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .dot { width:8px; height:8px; background:var(--teal); border-radius:50%; display:inline-block; margin-right:5px; box-shadow:0 0 0 2px rgba(46,207,170,.25); }
  .badge { margin-left:auto; background:rgba(46,207,170,.08); border:1px solid rgba(46,207,170,.25); border-radius:20px; padding:4px 11px; font-size:10px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:var(--teal); }
  .new-btn { background:var(--dark3); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:5px 10px; font-size:11.5px; cursor:pointer; transition:all .18s; margin-left:8px; }
  .new-btn:hover { color:var(--teal); border-color:var(--teal); }
  .messages { flex:1; overflow-y:auto; padding:18px 14px; display:flex; flex-direction:column; gap:12px; background:var(--dark2); }
  .messages::-webkit-scrollbar { width:4px; }
  .messages::-webkit-scrollbar-thumb { background:var(--dark3); border-radius:4px; }
  .msg { display:flex; gap:10px; max-width:87%; }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg.bot  { align-self:flex-start; }
  .mic { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:2px; }
  .bot  .mic { background:var(--teal); color:var(--dark); font-weight:700; }
  .user .mic { background:var(--dark3); color:var(--teal); border:1px solid var(--border); }
  .bubble { padding:11px 14px; border-radius:13px; font-size:13.5px; line-height:1.62; word-break:break-word; }
  .bot  .bubble { background:var(--dark3); color:var(--text); border-top-left-radius:4px; border:1px solid var(--border); }
  .user .bubble { background:var(--teal); color:var(--dark); border-top-right-radius:4px; font-weight:500; }
  .bubble p { margin-bottom:5px; } .bubble p:last-child { margin-bottom:0; }
  .bubble ul,.bubble ol { padding-left:18px; margin:5px 0; }
  .bubble li { margin-bottom:3px; }
  .bubble strong { font-weight:700; }
  .bubble code { background:rgba(46,207,170,.12); border-radius:4px; padding:1px 5px; font-family:monospace; font-size:12.5px; color:var(--teal); }
  .esc-card { background:rgba(251,191,36,.06); border:1px solid rgba(251,191,36,.28); border-radius:10px; padding:11px 14px; margin-top:6px; font-size:13px; color:#fbbf24; display:flex; align-items:center; gap:8px; }
  .typing { display:flex; gap:5px; align-items:center; padding:12px 16px; }
  .typing span { width:7px; height:7px; background:var(--teal); border-radius:50%; animation:bop 1.2s infinite; opacity:.7; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .sugs { display:flex; flex-wrap:wrap; gap:7px; padding:10px 14px 6px; border-top:1px solid var(--border); }
  .sug { background:var(--dark3); border:1px solid var(--border); border-radius:20px; padding:6px 12px; font-size:12px; color:var(--muted); cursor:pointer; transition:all .18s; font-weight:500; }
  .sug:hover { background:rgba(46,207,170,.1); color:var(--teal); border-color:rgba(46,207,170,.4); }
  .inp-area { padding:12px 14px; border-top:1px solid var(--border); background:var(--dark); display:flex; gap:10px; align-items:flex-end; flex-shrink:0; }
  textarea { flex:1; border:1.5px solid var(--border); border-radius:10px; padding:10px 14px; font-size:13.5px; font-family:inherit; resize:none; outline:none; min-height:44px; max-height:120px; transition:border-color .2s; line-height:1.5; background:var(--dark2); color:var(--text); }
  textarea:focus { border-color:var(--teal); }
  textarea::placeholder { color:var(--muted); }
  .send { width:44px; height:44px; background:var(--teal); border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity .18s,transform .1s; }
  .send:hover { opacity:.85; } .send:active { transform:scale(.93); } .send:disabled { opacity:.3; cursor:not-allowed; }
  .send svg { width:19px; height:19px; fill:var(--dark); }
  .foot { text-align:center; padding:7px; font-size:10.5px; color:var(--muted); background:var(--dark); border-top:1px solid var(--border); }
  .foot span { color:var(--teal); font-weight:600; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <svg height="38" viewBox="0 0 130 38" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <rect x="0" y="0" width="38" height="38" rx="6" fill="#2ecfaa"/>
      <line x1="10" y1="29" x2="28" y2="10" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
      <polyline points="15,10 28,10 28,23" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <text x="46" y="28" font-family="'Segoe UI',Arial Black,sans-serif" font-weight="900" font-size="25" fill="white" letter-spacing="1">WCF</text>
    </svg>
    <div class="divider"></div>
    <div class="header-info">
      <h1>WCF Suporte Técnico IA</h1>
      <p><span class="dot"></span>Online — Pronto para ajudar</p>
    </div>
    <div class="badge">Help Desk N1</div>
    <button class="new-btn" onclick="resetChat()">↺ Nova conversa</button>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="sugs" id="sugs">
    <button class="sug" onclick="qs('Não consigo acessar meu e-mail')">📧 E-mail</button>
    <button class="sug" onclick="qs('Minha internet está lenta ou caindo')">🌐 Internet lenta</button>
    <button class="sug" onclick="qs('Computador travando ou muito lento')">💻 PC travando</button>
    <button class="sug" onclick="qs('Não consigo fazer login ou acessar o sistema')">🔐 Problema de acesso</button>
    <button class="sug" onclick="qs('Preciso de ajuda com o CRM do Bitrix24')">📋 CRM Bitrix24</button>
    <button class="sug" onclick="qs('Impressora com problema')">🖨️ Impressora</button>
    <button class="sug" onclick="qs('Como configurar automações no Bitrix24')">⚙️ Automações</button>
    <button class="sug" onclick="qs('Problema com WhatsApp no Contact Center')">💬 WhatsApp</button>
  </div>

  <div class="inp-area">
    <textarea id="inp" placeholder="Descreva seu problema técnico..." rows="1"
      onkeydown="hk(event)" oninput="ar(this)"></textarea>
    <button class="send" id="sbtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="foot">WCF Tecnologia e Gestão &nbsp;•&nbsp; <span>Help Desk N1</span> &nbsp;•&nbsp; Powered by Claude AI</div>
</div>

<script>
const API_KEY = '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';

const SYS = `Você é o Will, Assistente de Suporte Técnico N1 da WCF Tecnologia e Gestão. Seu papel é atender usuários e clientes com problemas técnicos, resolvendo no primeiro nível antes de escalar para um técnico humano.

BASE DE CONHECIMENTO — BITRIX24 HELPDESK (https://helpdesk.bitrix24.com.br/):
Categorias disponíveis: Cadastro e Login, Segurança, Feed, Messenger, Calendário, Bitrix24 Drive, E-mail, Tarefas e Projetos, CRM, CoPilot IA, Contact Center, WhatsApp, Telefonia, Automação, Marketing, Videoconferências, Processos de Negócio, Assinatura, Configurações, Bitrix24 On-premise, Autenticação de dois fatores.

DIRETRIZES:
- Seu nome é Will. Você JÁ se apresentou na mensagem de boas-vindas, então NÃO se reapresente nas respostas seguintes. Vá direto ao assunto.
- Seja direto, claro e profissional, mas amigável.
- Diagnostique e resolva problemas passo a passo.
- Cubra: internet, Wi-Fi, VPN, e-mail, hardware, software, acessos, antivírus, Bitrix24, Office 365, Windows, Linux, backup.
- Confirme se o problema foi resolvido.
- Escale para técnico humano da WCF APENAS se: requer acesso físico, permissões admin, não resolvido após 2-3 tentativas, ou falha grave de hardware.
- Responda SEMPRE em português brasileiro.
- Use listas numeradas para passos. Seja conciso.`;

let hist = [], busy = false;

function addMsg(role, text) {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = '<div class="mic">' + (role === 'bot' ? '⚡' : '👤') + '</div><div class="bubble">' + fmt(text) + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function fmt(t) {
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/^(\d+\.\s.+)$/gm,'<li>$1</li>');
  t = t.replace(/^[-•]\s(.+)$/gm,'<li>$1</li>');
  t = t.replace(/(<li>[\s\S]*?<\/li>)/g, function(m){ return '<ul>'+m+'</ul>'; });
  t = t.replace(/\n\n+/g,'</p><p>');
  t = t.replace(/\n/g,'<br>');
  return '<p>' + t + '</p>';
}

function showTyping() {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.id = 'typ';
  d.innerHTML = '<div class="mic">⚡</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function rmTyping() {
  const t = document.getElementById('typ');
  if (t) t.remove();
}

async function send(txt) {
  const el = document.getElementById('inp');
  const msg = (txt || el.value).trim();
  if (!msg || busy) return;
  el.value = '';
  ar(el);
  document.getElementById('sugs').style.display = 'none';
  addMsg('user', msg);
  hist.push({ role: 'user', content: msg });
  busy = true;
  document.getElementById('sbtn').disabled = true;
  showTyping();
  try {
    const r = await fetch('/.netlify/functions/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYS, messages: hist })
    });
    const data = await r.json();
    const rep = data.content ? data.content.map(function(b){ return b.text || ''; }).join('') : 'Desculpe, não consegui processar.';
    rmTyping();
    addMsg('bot', rep);
    hist.push({ role: 'assistant', content: rep });
    if (/técnico humano|aguardar|escalar|atendimento humano/i.test(rep)) {
      const c = document.getElementById('msgs');
      const card = document.createElement('div');
      card.className = 'esc-card';
      card.innerHTML = '⚠️ <span><strong>Chamado escalado:</strong> Um técnico da WCF entrará em contato em breve.</span>';
      c.appendChild(card);
      c.scrollTop = c.scrollHeight;
    }
  } catch(e) {
    rmTyping();
    addMsg('bot', 'Erro de conexão. Verifique sua internet e tente novamente.');
  }
  busy = false;
  document.getElementById('sbtn').disabled = false;
  document.getElementById('inp').focus();
}

function qs(t) { send(t); }
function hk(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function ar(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

function resetChat() {
  hist = [];
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('sugs').style.display = 'flex';
  init();
}

function init() {
  addMsg('bot', 'Olá! 👋 Eu sou o **Will**, assistente virtual da **WCF Tecnologia e Gestão**.\n\nEstou aqui para resolver seu problema o mais rápido possível. Se não conseguirmos resolver juntos, encaminharei para um de nossos técnicos.\n\n**Como posso te ajudar hoje?**');
}

window.onload = function() { init(); };
</script>
</body>
</html>
